<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="google-site-verification" content="YiwYT4eh5mCMQ1OmfqwSanh9TSMyUJ7KF_bu3O4CzSY" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro APK Store - Download Free Android Apps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://pl30488687.effectivecpmnetwork.com/52/71/a3/5271a3e0587b162be92f0cc7b38802ed.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans">

  <!-- Navbar -->
  <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-500/30">
          <i class="fa-solid fa-box-archive text-2xl text-white"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Pro APK Store</h1>
          <p class="text-xs text-slate-400">Safe & Fast Android Downloads</p>
        </div>
      </div>

      <!-- Search Input -->
      <div class="relative w-full sm:w-72">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
        <input type="text" id="searchInput" placeholder="Search apps..." 
          class="w-full bg-slate-800 text-sm text-slate-200 placeholder-slate-400 pl-9 pr-4 py-2 rounded-xl border border-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 py-8 flex-1 w-full">
    
    <!-- Category Filter -->
    <div class="flex items-center gap-2 overflow-x-auto pb-4 mb-6 no-scrollbar" id="categoryContainer">
      <button onclick="filterCategory('All')" class="cat-btn active bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition">All Apps</button>
      <button onclick="filterCategory('Browser')" class="cat-btn bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition">Browsers</button>
      <button onclick="filterCategory('Communication')" class="cat-btn bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition">Communication</button>
      <button onclick="filterCategory('Video Players')" class="cat-btn bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition">Video Players</button>
    </div>

    <!-- Apps Grid -->
    <div id="appsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <div class="col-span-full text-center py-12 text-slate-500">
        <i class="fa-solid fa-spinner animate-spin text-3xl mb-2"></i>
        <p>Loading apps...</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-900 border-t border-slate-800 py-6 text-center text-xs text-slate-500">
    <p>© 2026 Pro APK Store. All rights reserved.</p>
  </footer>

  <script>
    let allApps = [];
    let selectedCategory = 'All';

    async function fetchApps() {
      try {
        const res = await fetch('/api/apps');
        allApps = await res.json();
        renderApps();
      } catch (err) {
        document.getElementById('appsGrid').innerHTML = `
          <div class="col-span-full text-center py-12 text-red-400">
            <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
            <p>Failed to load apps!</p>
          </div>`;
      }
    }

    function renderApps() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const grid = document.getElementById('appsGrid');
      
      const filtered = allApps.filter(app => {
        const matchesCat = selectedCategory === 'All' || app.category === selectedCategory;
        const matchesSearch = app.name.toLowerCase().includes(searchTerm) || 
                              app.developer.toLowerCase().includes(searchTerm);
        return matchesCat && matchesSearch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-12 text-slate-400">
            <i class="fa-solid fa-ghost text-4xl mb-3 text-slate-600"></i>
            <p class="font-medium">No apps found</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(app => `
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 hover:border-indigo-500/50 transition duration-300 flex flex-col justify-between group shadow-lg">
          <div>
            <div class="flex items-start gap-4 mb-3">
              <img src="${app.icon}" alt="${app.name}" class="w-16 h-16 rounded-2xl object-cover bg-slate-800 border border-slate-700/50 group-hover:scale-105 transition duration-300" onerror="this.src='https://api.iconify.design/lucide:box.svg'">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  ${app.isPopular ? '<span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 text-[10px] px-2 py-0.5 rounded-full font-semibold">Popular</span>' : ''}
                  ${app.isLatest ? '<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-[10px] px-2 py-0.5 rounded-full font-semibold">Latest</span>' : ''}
                </div>
                <h3 class="font-bold text-slate-100 truncate text-base">${app.name}</h3>
                <p class="text-xs text-slate-400 truncate">${app.developer}</p>
              </div>
            </div>
            
            <p class="text-xs text-slate-400 line-clamp-2 mb-4 leading-relaxed">${app.description}</p>
            
            <div class="flex items-center gap-3 text-xs text-slate-400 mb-4 bg-slate-950/50 p-2.5 rounded-xl border border-slate-800/80">
              <div class="flex items-center gap-1"><i class="fa-solid fa-code-branch text-indigo-400"></i> v${app.version}</div>
              <div class="w-1 h-1 bg-slate-700 rounded-full"></div>
              <div class="flex items-center gap-1"><i class="fa-solid fa-hard-drive text-cyan-400"></i> ${app.size}</div>
              <div class="w-1 h-1 bg-slate-700 rounded-full"></div>
              <div class="truncate"><i class="fa-solid fa-folder text-amber-400"></i> ${app.category}</div>
            </div>
          </div>

          <a href="${app.download_url}" target="_blank" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20 transition duration-200">
            <i class="fa-solid fa-download"></i> Download APK
          </a>
        </div>
      `).join('');
    }

    function filterCategory(cat) {
      selectedCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        if(btn.innerText.includes(cat) || (cat === 'All' && btn.innerText.includes('All'))) {
          btn.className = 'cat-btn active bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition';
        } else {
          btn.className = 'cat-btn bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition';
        }
      });
      renderApps();
    }

    document.getElementById('searchInput').addEventListener('input', renderApps);
    fetchApps();
  </script>
</body>
</html>
